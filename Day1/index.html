<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithms Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>Sorting Visualizer</h1>
        </header>

        <!-- Controls container -->
        <div class="controls-container">
            
            <div class="control-group">
                <button id="generate-array-btn">Generate New Array</button>
            </div>

            <div class="control-group">
                <label for="array-size">Array Size:</label>
                <input type="range" id="array-size" min="10" max="100" value="50">
            </div>

            <div class="control-group">
                <label for="sort-speed">Sorting Speed (Delay ms):</label>
                <input type="range" id="sort-speed" min="10" max="500" value="50">
                <span id="speed-value">50</span>
            </div>

            <div class="control-group buttons-container">
                <button id="bubble-sort-btn" class="alg-btn">Bubble Sort</button>
                <button id="selection-sort-btn" class="alg-btn">Selection Sort</button>
                <button id="insertion-sort-btn" class="alg-btn">Insertion Sort</button>
                <button id="merge-sort-btn" class="alg-btn">Merge Sort</button>
                <button id="quick-sort-btn" class="alg-btn">Quick Sort</button>
            </div>

        </div>

        <!-- Main visualization container -->
        <div class="visualization-container" id="visualization-container">
            <!-- Array bars generated by JavaScript -->
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
